  <div class="page-content">
  <main>

    <section id="intro">
      <p class="greeting">
        <span class="hello-group" id="greeting-group">
          <span class="hello-word" id="greeting-word">Hello</span><span class="hello-punct" id="greeting-punct">!</span>
        </span>
        <span class="judy">I'm Judy 👋🏻</span>
      </p>
    </section>

  </main>

  </div>

  <script>
    const greetings = [
      { word: 'Hello',       punct: '!',  color: '#cc2f00' },
      { word: '¡Hola',      punct: '!',  color: '#db6600' },
      { word: '你好',        punct: '!',  color: '#e39e00' },
      { word: 'Bonjour',    punct: '!',  color: '#76b80d' },
      { word: 'こんにちは',  punct: '!',  color: '#007668' },
      { word: 'привет',     punct: '!',  color: '#006486' },
      { word: 'olá',        punct: '!',  color: '#007cb5' },
      { word: 'Hallo',      punct: '!',  color: '#465ab2' },
      { word: 'হ্যালো',     punct: '!',  color: '#6d47b1' },
      { word: 'مرحبًا!',   punct: '',   color: '#873b9c' },
    ];

    let current = 0;
    const wordEl = document.getElementById('greeting-word');
    const punctEl = document.getElementById('greeting-punct');
    const groupEl = document.getElementById('greeting-group');

    function nextGreeting() {
      groupEl.classList.add('greeting-exit');
      setTimeout(() => {
        current = (current + 1) % greetings.length;
        const g = greetings[current];
        wordEl.textContent = g.word;
        punctEl.textContent = g.punct;
        groupEl.style.color = g.color;
        groupEl.classList.remove('greeting-exit');
        groupEl.classList.add('greeting-enter');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          groupEl.classList.remove('greeting-enter');
        }));
      }, 150);
    }

    setInterval(nextGreeting, 1000);
  </script>
