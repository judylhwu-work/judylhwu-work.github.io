<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../favicon.ico">
  <title>LeanTaaS — Judy Wu</title>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../project.css">
  <script src="../theme.js"></script>
  <script>
    if (sessionStorage.getItem('leantaas-auth') === 'true') {
      location.replace('leantaas.html');
    }
  </script>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-logo"><span class="nav-jw">JW</span><span class="nav-sep"> | </span><span class="nav-name">Judy Wu</span></a>
    <div class="nav-right">
      <ul>
        <li><a href="../index.html"><span>Home</span></a></li>
        <li><a href="../work.html" class="nav-active"><span>Projects</span></a></li>
        <li><a href="../experience.html"><span>Resume</span></a></li>
        <li><a href="../about.html"><span>About</span></a></li>
      </ul>
      <div class="nav-divider"></div>
      <button class="nav-dark-mode" title="Toggle dark mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </nav>

  <div class="page-content">
  <main>

    <section id="project-gate">
      <a href="../work.html" class="back-link">← Back to all projects</a>
      <div class="gate-card">

        <svg class="gate-lock" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="#ff8ac3"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>

        <p class="project-cat-label">HealthTech · Design Systems</p>
        <h1>LeanTaaS</h1>
        <p class="gate-message">This case study is protected by NDA. Enter the password to continue — or reach out and I'll share it with you directly.</p>

        <form class="gate-form" id="gate-form" autocomplete="off">
          <input
            class="gate-input"
            id="gate-input"
            type="password"
            placeholder="Password"
            autocomplete="new-password"
            spellcheck="false"
          >
          <p class="gate-error" id="gate-error">Incorrect password. Try again.</p>
          <button class="gate-submit" type="submit">View case study</button>
        </form>

      </div>
    </section>

  </main>
  </div>

  <script>
    const PASS = atob('bm92YTIwMjQ=');
    var form  = document.getElementById('gate-form');
    var input = document.getElementById('gate-input');
    var error = document.getElementById('gate-error');

    var submit = document.getElementById('gate-form').querySelector('.gate-submit');
    submit.disabled = true;

    input.addEventListener('input', function () {
      error.style.display = 'none';
      submit.disabled = input.value.length === 0;
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (input.value === PASS) {
        sessionStorage.setItem('leantaas-auth', 'true');
        location.replace('leantaas.html');
      } else {
        error.style.display = 'block';
        input.value = '';
        input.focus();
        submit.disabled = true;
      }
    });
  </script>

</body>
</html>
